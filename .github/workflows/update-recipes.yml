name: Update content
run-name: ${{ github.actor }} updating recipes 🚀

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [update_content]
  # 💡 Removed pull_request to prevent auto-commits from breaking unmerged PR pipelines

# Prevent multiple runs from racing against each other on master
concurrency:
  group: update-content-master
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout full history
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 3️⃣ Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade-strategy only-if-needed flake8 pytest
          if [ -f scripts/requirements.txt ]; then pip install --upgrade-strategy only-if-needed -r scripts/requirements.txt; fi

      # 5️⃣ Generate content
      - name: Execute Python script
        run: |
          python scripts/import_recipes.py --output-dir ./astro/src/content/recipes/ --image-dir ./astro/public/originals/

      # 6️⃣ Commit updates if any (Identity config added directly here!)
      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Change: Update Recipes"
          # 🤖 This cleanly solves the identity issue without needing global git config hacks
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # 7️⃣ Setup Node 22 for Astro
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 8️⃣ Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 9️⃣ Cache pnpm store dynamically
      - name: Get pnpm store path
        id: pnpm-path
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-path.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # 1️⃣0️⃣ Install Node dependencies
      - name: Install Node dependencies
        run: pnpm install
        working-directory: ./astro

      # 1️⃣1️⃣ Build Astro site
      - name: Build Astro site
        run: pnpm run build
        working-directory: ./astro

      # Extra safety check
      - name: Check build output
        run: ls -la ./astro/dist

      # 1️⃣2️⃣ Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >
            pages deploy ./astro/dist
            --project-name=burnbook-astro-frontend

      # 1️⃣3️⃣ Purge Cloudflare cache by prefix
      - name: Purge Cloudflare cache by prefix
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "prefixes": [
                "burnbook.zh0nb.com/recipes/",
                "burnbook.zh0nb.com/"
              ]
            }'