name: Stage 3 - Image Generation + Build

on:
  push:
    paths:
      - astro/src/assets/asset-map.json
      - astro/src/content/**
      - astro/src/image-manifest.json
  workflow_dispatch:

jobs:
  stage3:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Node setup
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('astro/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      # Restore pnpm cache
      # -----------------------------
      - name: Install dependencies
        working-directory: ./astro
        run: pnpm install --frozen-lockfile

      # -----------------------------
      # Restore image cache (CRITICAL)
      # -----------------------------
      - name: Restore image cache
        uses: actions/cache@v4
        with:
          path: .cache/originals
          key: images-${{ hashFiles('astro/src/content/_asset-index.json') }}
          restore-keys: |
            images-

      # -----------------------------
      # Generate images (Sharp)
      # -----------------------------
      - name: Generate image variants
        working-directory: ./astro
        run: node scripts/generate-images.mjs

      # -----------------------------
      # Build Astro
      # -----------------------------
      - name: Build Astro
        working-directory: ./astro
        run: pnpm run build

      # -----------------------------
      # Deploy
      # -----------------------------
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./astro/dist --project-name=burnbook-astro-frontend