name: Update content
run-name: ${{ github.actor }} updating recipes 🚀

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [update_content]
  # 💡 Removed pull_request to prevent auto-commits from breaking unmerged PR pipelines

# Prevent multiple runs from racing against each other on master
concurrency:
  group: update-content-master
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout full history
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 3️⃣ Cache pip dependencies
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade-strategy only-if-needed flake8 pytest
          if [ -f scripts/requirements.txt ]; then pip install --upgrade-strategy only-if-needed -r scripts/requirements.txt; fi

      # 5️⃣ Generate content
      - name: Execute Python script
        run: |
          python scripts/import_recipes.py --output-dir ./astro/src/content/recipes/ --image-dir ./astro/public/originals/

      # 6️⃣ Commit updates if any
      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Change: Update Recipes"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # 7️⃣ Trigger Stage 2 (asset sync)
      - name: Trigger Stage 2 (asset sync)
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"stage2_assets"}'
