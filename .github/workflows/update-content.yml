name: Update content
run-name: ${{ github.actor }} updating recipes 🚀

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [update_content]
  # 💡 Allows you to run this workflow manually from the Actions tab on any branch
  workflow_dispatch:

# Prevent multiple runs from racing against each other on the same branch
concurrency:
  group: update-content-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout full history (Upgraded to v6 for Node 24)
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 2️⃣ Setup Python (Upgraded to v5 which supports modern runtimes)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # 3️⃣ Cache pip dependencies (Upgraded to v5 for Node 24)
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4️⃣ Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade-strategy only-if-needed flake8 pytest
          if [ -f scripts/requirements.txt ]; then pip install --upgrade-strategy only-if-needed -r scripts/requirements.txt; fi

      # 5️⃣ Generate content
      - name: Execute Python script
        run: |
          python scripts/import_recipes.py --output-dir ./astro/src/content/recipes/ --image-dir ./astro/public/originals/

      # 6️⃣ Commit updates if any
      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Automated Change: Update Recipes"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # 7️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 8️⃣ Enable corepack (pnpm)
      - name: Enable corepack (pnpm)
        run: corepack enable

      # 9️⃣ Cache pnpm store
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('astro/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-

      # 1️⃣0️⃣ Install dependencies
      - name: Install dependencies
        working-directory: ./astro
        run: pnpm install --frozen-lockfile

      # 1️⃣1️⃣ Build Astro
      - name: Build Astro
        working-directory: ./astro
        run: pnpm run build

      # 1️⃣2️⃣ Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ./astro/dist --project-name=burnbook-astro-frontend
        
      # 1️⃣3️⃣ Purge Cloudflare cache by prefix
      - name: Purge Cloudflare cache by prefix
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "prefixes": [
                "burnbook.zh0nb.com/recipes/",
                "burnbook.zh0nb.com/"
              ]
            }'